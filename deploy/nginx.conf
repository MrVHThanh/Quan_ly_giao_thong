# deploy/nginx.conf — Cấu hình Nginx reverse proxy
# Thay "your-domain.com" bằng domain thực tế
# Cài cert: sudo certbot --nginx -d your-domain.com

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.com;

    # SSL — do Certbot tự điền sau khi chạy certbot
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Giới hạn kích thước upload
    client_max_body_size 10M;

    # Proxy sang Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Serve static files trực tiếp (không qua Gunicorn)
    location /static/ {
        alias /opt/giaothong/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
