# deploy/nginx.conf — Cấu hình Nginx reverse proxy
# Domain: soxaydunglaocai.vn — VPS IP: 171.244.140.146
# Cài cert: sudo certbot --nginx -d soxaydunglaocai.vn -d www.soxaydunglaocai.vn

# Redirect HTTP → HTTPS (cả www và non-www)
server {
    listen 80;
    server_name soxaydunglaocai.vn www.soxaydunglaocai.vn;
    return 301 https://soxaydunglaocai.vn$request_uri;
}

# Redirect www HTTPS → non-www HTTPS
server {
    listen 443 ssl;
    server_name www.soxaydunglaocai.vn;

    ssl_certificate     /etc/letsencrypt/live/soxaydunglaocai.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soxaydunglaocai.vn/privkey.pem;

    return 301 https://soxaydunglaocai.vn$request_uri;
}

server {
    listen 443 ssl;
    server_name soxaydunglaocai.vn;

    # SSL — do Certbot cấp (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/soxaydunglaocai.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soxaydunglaocai.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # HSTS — bắt buộc HTTPS trong 1 năm
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers bổ sung (ngoài những gì app đã set)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Ẩn phiên bản Nginx
    server_tokens off;

    # Giới hạn kích thước upload (ảnh đoạn tuyến)
    client_max_body_size 10M;

    # Proxy sang Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Serve static files trực tiếp (không qua Gunicorn — nhanh hơn)
    location /static/ {
        alias /home/giaothong/giaothong-app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Chặn truy cập các file nhạy cảm
    location ~ /\. {
        deny all;
    }
    location ~ \.(db|env|py|cfg|ini|log)$ {
        deny all;
    }
}
